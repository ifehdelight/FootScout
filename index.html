<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>FutBall Manager</title>
   <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
      <h2 class="app-name" style="color: #E9EDF2;" >Futball Manager </h2>
      <input 
         type="text" 
         name="search" 
         class="searchInput"
         placeholder = "Search for players.."
      >
      <button class="search-icon" type="submit">🔍</button>
      <div class="populars">
         <h4> Popular Searches..</h4>
         <div class="popular-players">
            <div class="player-card">
               <img src="mock-images/player-img3.jpg" alt="player image" width="90" height="120"/>
               <p class="player-infos">
                     Lionel Messi 
               </p>
            </div>
            <div class="player-card">
               <img src="mock-images/player-img3.jpg" alt="player image" width="90" height="120"/>
               <p class="player-infos">
                     Chritiano Ronaldo
               </p>
            </div>
            <div class="player-card">
               <img src="mock-images/player-img.jpg" alt="player image" width="90" height="120"/>
               <p class="player-infos">
                     Kylian Mbappe
               </p>
            </div>
         </div>
      </div>
   </div>
</body>

</html>
